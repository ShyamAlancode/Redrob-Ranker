# ============================================================================
# AI tools declaration
# ============================================================================
# Declared use is not penalized; contradictions at Stage 5 are. Keep this honest.
ai_tools_used:
  - "Claude"

ai_usage_summary: |
  Used Claude (claude.ai) throughout development: architecture discussion,
  drafting and reviewing the scoring modules, calibrating honeypot checks
  against the sample data, and test design. All design decisions (weighting,
  penalty structure, trap handling) were reviewed, understood and owned by me;
  I can defend every component. No candidate data was sent to any hosted LLM,
  and the ranking step itself makes no LLM or network calls.

# ============================================================================
# Approach summary
# ============================================================================
methodology_summary: |
  Offline rule-based ranker. Pre-computation: precompute.py normalizes skills
  and career history, and precomputes static behavior and trust scores,
  saving candidate records to an optimized Parquet file.
  Ranking (< 5 min, CPU only): Final Score = 0.45 * career_relevance +
  0.20 * skills_match + 0.15 * experience_match + 0.10 * behavior_score +
  0.10 * trust_score. Scoring uses dynamic JD parsing to extract required/preferred
  skills and experience range, and maintains the top 100 candidates using a min-heap.
  The trust score precomputes soft additive penalties (e.g. -10 or -15) for
  contradictions (using a career keyword contradiction detector), suspicious
  skills list stuffing, profile incompleteness, consulting background with
  no AI/ML evidence, and other structural mismatch risks.

